default:
  variant_filtering:
    min_dp: 10
    min_gq: 30
    vaf_ref: 5
    vaf_hom: 95
    vaf_het: 30
    min_cell_pt: 10
    min_mut_cell_pt: 10
  cnv_filtering:
    cnv_ampCompleteness: 50
    cnv_ampReadDepth: 10
    cnv_meanCellReadDepth: 10
  cnv_clonal_inference:
