  protein_umap:
    umap_n_neighbors: 75
    umap_min_dist: 0.2
    umap_features: ["CD11b", "CD19", "CD3", "CD33", "CD34", "CD38", "CD45", "CD90", "HLA-DR"]
  compass:
    chains: 4
    chain_length: 2000
    patient_sex: "female" 
  unsupervised_custering:
    resolution: 0.15
  
  zenodo:
    dataset_url: "https://zenodo.org/records/20818440/files/4-cell-lines-AML-multiomics.dna+protein.h5?download=1"
